<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paulista da Verdade</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#f2f2f2;
}

.header {
  background:#c4170c;
  color:#fff;
  padding:15px;
  font-size:22px;
  font-weight:bold;
}

.container {
  max-width:1100px;
  margin:auto;
  padding:15px;
}

.carousel {
  position:relative;
  overflow:hidden;
  border-radius:10px;
}

.slide {
  display:none;
  position:relative;
}

.slide img {
  width:100%;
  height:350px;
  object-fit:cover;
}

.slide-content {
  position:absolute;
  bottom:0;
  background:rgba(0,0,0,0.6);
  color:#fff;
  width:100%;
  padding:15px;
}

.grid {
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:15px;
  margin-top:20px;
}

.card {
  background:#fff;
  border-radius:8px;
  overflow:hidden;
}

.card img {
  width:100%;
  height:200px;
  object-fit:cover;
}

.card-body {
  padding:10px;
}

.news-list .card {
  margin-bottom:10px;
}

.weather {
  background:#fff;
  padding:15px;
  border-radius:8px;
  margin-top:20px;
}

@media(max-width:768px){
  .grid {
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="header">Paulista de Verdade</div>

<div class="container">

<div id="carousel" class="carousel"></div>

<div class="grid">

<div id="mainNews"></div>

<div>
<div class="weather" id="weather">Carregando clima...</div>
</div>

</div>

<div class="news-list" id="listNews"></div>

</div>

<script>
const feeds = [
  "https://api.rss2json.com/v1/api.json?rss_url=https://g1.globo.com/rss/g1/pernambuco/",
  "https://api.rss2json.com/v1/api.json?rss_url=https://jamildo.com/feed"
];

async function loadNews() {
  let all = [];

  for (let url of feeds) {
    let res = await fetch(url);
    let data = await res.json();

    data.items.forEach(i=>{
      if(i.thumbnail){
        all.push({
          title:i.title,
          link:i.link,
          img:i.thumbnail,
          desc:i.description.replace(/<[^>]+>/g,"")
        });
      }
    });
  }

  render(all);
}

function render(news){

  // CARROSSEL
  let carousel = document.getElementById("carousel");

  news.slice(0,5).forEach((n,i)=>{
    carousel.innerHTML += `
      <div class="slide">
        <img src="${n.img}">
        <div class="slide-content">
          <h2>${n.title}</h2>
        </div>
      </div>
    `;
  });

  startCarousel();

  // PRINCIPAL
  let main = document.getElementById("mainNews");
  let first = news[0];

  main.innerHTML = `
    <div class="card">
      <img src="${first.img}">
      <div class="card-body">
        <h2>${first.title}</h2>
        <p>${first.desc.substring(0,150)}</p>
        <a href="${first.link}" target="_blank">Ler mais</a>
      </div>
    </div>
  `;

  // LISTA
  let list = document.getElementById("listNews");

  news.slice(1,15).forEach(n=>{
    list.innerHTML += `
      <div class="card">
        <img src="${n.img}">
        <div class="card-body">
          <h3>${n.title}</h3>
          <a href="${n.link}" target="_blank">Ver notícia</a>
        </div>
      </div>
    `;
  });
}

// CARROSSEL AUTO
function startCarousel(){
  let slides = document.querySelectorAll(".slide");
  let i = 0;

  function show(){
    slides.forEach(s=>s.style.display="none");
    slides[i].style.display="block";
    i = (i+1)%slides.length;
  }

  show();
  setInterval(show,4000);
}

// CLIMA (Paulista-PE)
async function loadWeather(){
  try{
    let res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=-7.94&longitude=-34.87&current_weather=true");
    let data = await res.json();

    document.getElementById("weather").innerHTML = `
      <h3>Clima em Paulista-PE</h3>
      <p>🌡️ ${data.current_weather.temperature}°C</p>
      <p>💨 Vento: ${data.current_weather.windspeed} km/h</p>
    `;
  }catch{
    document.getElementById("weather").innerText="Erro ao carregar clima";
  }
}

loadNews();
loadWeather();
</script>

</body>
</html>
